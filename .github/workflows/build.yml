name: Build Game

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: demo_game
        run: pip install -r requirement.txt

      - name: Build with PyInstaller
        working-directory: demo_game
        run: pyinstaller game.spec

      - name: Zip build
        run: Compress-Archive -Path demo_game/dist/game/* -DestinationPath game-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: game-windows.zip
